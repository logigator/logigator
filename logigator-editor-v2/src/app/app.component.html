<app-title-bar></app-title-bar>
<app-tool-bar class="border-b border-white/20"></app-tool-bar>
<div class="flex grow" *transloco="let t">
	<app-side-bar
		class="w-80 border-r border-white/20"
	></app-side-bar>
	<div class="grow flex flex-col">
		<div class="relative grow">
			<app-board
				class="block w-full h-full"
				[project]="projectService.activeProject()"
				(positionChange)="boardPosition.set($event)"
			></app-board>
			@if (componentSettings(); as settings) {
				<p-card
					class="absolute m-2 bottom-0 right-0 max-w-96"
					[header]="t(settings.name)"
					[subheader]="t(settings.description)"
				>
					<app-component-settings
						[config]="settings.options"
					></app-component-settings>
				</p-card>
			}
		</div>
		<app-status-bar [boardPosition]="boardPosition()"></app-status-bar>
	</div>
</div>
