<button
  (click)="menu.toggle($event)"
  pRipple
  class="flex items-center gap-2 px-3 py-2 cursor-pointer rounded transition-colors hover:bg-surface-900 hover:text-white"
  [class.bg-surface-900]="menuOpen()"
  [class.text-white]="menuOpen()"
>
  @if (userService.user(); as user) {
    <p-avatar
      [image]="userImageUrl()"
      [label]="userImageUrl() ? undefined : userInitial()"
      shape="circle"
    />
    <span class="font-medium">{{ user.username }}</span>
  } @else {
    <p-avatar icon="ph ph-user" shape="circle" />
    <span class="font-medium">Not signed in</span>
  }
  <i class="ph ph-caret-down"></i>
</button>

<p-menu
  #menu
  [model]="menuItems()"
  [popup]="true"
  (onShow)="menuOpen.set(true)"
  (onHide)="menuOpen.set(false)"
>
  <ng-template #start>
    <div class="flex flex-col items-center gap-2 px-4 pt-4">
      @if (userService.user(); as user) {
        <p-avatar
          [image]="userImageUrl()"
          [label]="userImageUrl() ? undefined : userInitial()"
          shape="circle"
          size="xlarge"
        />
        <span class="font-semibold text-lg">{{ user.username }}</span>
      } @else {
        <p-avatar icon="ph ph-user" shape="circle" size="xlarge" />
        <span class="text-sm">Not signed in</span>
      }
    </div>
    <p-divider />
    <div class="flex flex-col gap-4 px-4 pb-4">
      <div class="flex flex-col gap-2">
        <span class="text-xs font-semibold uppercase tracking-wider text-surface-500">Theme</span>
        <app-theme-switcher class="min-w-64"/>
      </div>
      <div class="flex flex-col gap-2">
        <span class="text-xs font-semibold uppercase tracking-wider text-surface-500">Language</span>
        <app-language-switcher />
      </div>
    </div>
  </ng-template>
  <ng-template #item let-item>
    <a pRipple class="flex cursor-pointer items-center gap-2 px-3 py-2">
      @if (item.icon) {
        <i [class]="item.icon"></i>
      }
      <span>{{ item.label }}</span>
    </a>
  </ng-template>
</p-menu>
