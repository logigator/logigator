<ng-template let-item="item" #itemTemplate>
	<div class="flex gap-1 items-center">
		@if (item.icon) {
			<i [class]="item.icon"></i>
		}
		@if (item.label) {
			<span>{{ item.label }}</span>
		}
	</div>
</ng-template>

<form class="flex flex-col gap-2" *transloco="let t">
	@for (option of config(); track $index) {
		<div class="flex gap-4 items-center justify-between">
			<label [for]="'component-settings-input-' + $index">{{
				t(option.label)
			}}</label>
			@if (isNumberInput(option)) {
				<p-inputNumber
					[id]="'component-settings-input-' + $index"
					[name]="'component-settings-input-' + $index"
					[showButtons]="true"
					[min]="option.min"
					[max]="option.max"
					size="small"
					[ngModel]="option.value"
					(ngModelChange)="option.value = $event"
				></p-inputNumber>
			} @else if (isSelectInput(option) && option.type === 'button') {
				<p-selectButton
					[id]="'component-settings-input-' + $index"
					[name]="'component-settings-input-' + $index"
					optionLabel="label"
					optionValue="value"
					[allowEmpty]="false"
					[options]="option.options"
					[ngModel]="option.value"
					(ngModelChange)="option.value = $event"
				>
					<ng-template #item let-item pTemplate>
						<ng-container
							*ngTemplateOutlet="itemTemplate; context: { item }"
						></ng-container>
					</ng-template>
				</p-selectButton>
			} @else if (isSelectInput(option) && option.type === 'dropdown') {
				<p-select
					[id]="'component-settings-input-' + $index"
					[name]="'component-settings-input-' + $index"
					optionLabel="label"
					optionValue="value"
					[options]="option.options"
					[ngModel]="option.value"
					(ngModelChange)="option.value = $event"
				>
					<ng-template #item let-item pTemplate="selectedItem">
						<ng-container
							*ngTemplateOutlet="itemTemplate; context: { item }"
						></ng-container>
					</ng-template>
					<ng-template #item let-item pTemplate="item">
						<ng-container
							*ngTemplateOutlet="itemTemplate; context: { item }"
						></ng-container>
					</ng-template>
				</p-select>
			}
		</div>
	}
</form>
