<div *transloco="let t" class="flex flex-wrap p-2 gap-1">
  <p-button
    [pTooltip]="saveTooltip()"
    [ariaLabel]="saveTooltip()"
    (onClick)="save()"
    tooltipPosition="bottom"
    icon="ph ph-floppy-disk"
    severity="secondary"
  ></p-button>
  <p-button
    [pTooltip]="openTooltip()"
    [ariaLabel]="openTooltip()"
    (onClick)="open()"
    tooltipPosition="bottom"
    icon="ph ph-folder-open"
    severity="secondary"
  ></p-button>
  <p-button
    [pTooltip]="t('toolBar.newComp')"
    [ariaLabel]="t('toolBar.newComp')"
    tooltipPosition="bottom"
    icon="ph ph-cpu"
    severity="secondary"
  ></p-button>
  <p-divider class="m-2" styleClass="p-0 m-0" layout="vertical"></p-divider>
  <p-button
    [pTooltip]="copyTooltip()"
    [ariaLabel]="copyTooltip()"
    (onClick)="copy()"
    tooltipPosition="bottom"
    icon="ph ph-copy"
    severity="secondary"
  ></p-button>
  <p-button
    [pTooltip]="cutTooltip()"
    [ariaLabel]="cutTooltip()"
    (onClick)="cut()"
    tooltipPosition="bottom"
    icon="ph ph-scissors"
    severity="secondary"
  ></p-button>
  <p-button
    [pTooltip]="pasteTooltip()"
    [ariaLabel]="pasteTooltip()"
    (onClick)="paste()"
    tooltipPosition="bottom"
    icon="ph ph-clipboard"
    severity="secondary"
  ></p-button>
  <p-button
    [pTooltip]="deleteTooltip()"
    [ariaLabel]="deleteTooltip()"
    (onClick)="delete()"
    tooltipPosition="bottom"
    icon="ph ph-trash"
    severity="secondary"
  ></p-button>
  <p-divider class="m-2" styleClass="p-0 m-0" layout="vertical"></p-divider>

  <p-button
    [pTooltip]="undoTooltip()"
    [ariaLabel]="undoTooltip()"
    (onClick)="undo()"
    tooltipPosition="bottom"
    icon="ph ph-arrow-u-up-left"
    severity="secondary"
  ></p-button>
  <p-button
    [pTooltip]="redoTooltip()"
    [ariaLabel]="redoTooltip()"
    (onClick)="redo()"
    tooltipPosition="bottom"
    icon="ph ph-arrow-u-up-right"
    severity="secondary"
  ></p-button>
  <p-divider class="m-2" styleClass="p-0 m-0" layout="vertical"></p-divider>

  <p-button
    [pTooltip]="zoomOutTooltip()"
    [ariaLabel]="zoomOutTooltip()"
    (onClick)="zoomOut()"
    tooltipPosition="bottom"
    icon="ph ph-magnifying-glass-minus"
    severity="secondary"
  ></p-button>
  <p-button
    [pTooltip]="zoomInTooltip()"
    [ariaLabel]="zoomInTooltip()"
    (onClick)="zoomIn()"
    tooltipPosition="bottom"
    icon="ph ph-magnifying-glass-plus"
    severity="secondary"
  ></p-button>
  <p-divider class="m-2" styleClass="p-0 m-0" layout="vertical"></p-divider>

  <p-button
    [pTooltip]="placeWiresTooltip()"
    [ariaLabel]="placeWiresTooltip()"
    [outlined]="!isWireDrawMode()"
    (onClick)="setWireDrawMode()"
    tooltipPosition="bottom"
    icon="ph ph-line-segment"
    severity="secondary"
  ></p-button>
  <p-button
    [pTooltip]="connWiresTooltip()"
    [ariaLabel]="connWiresTooltip()"
    [outlined]="!isWireConnMode()"
    (onClick)="setWireConnMode()"
    tooltipPosition="bottom"
    icon="ph ph-prohibit"
    severity="secondary"
  ></p-button>
  <p-button
    [pTooltip]="selectTooltip()"
    [ariaLabel]="selectTooltip()"
    [outlined]="!isSelectMode()"
    (onClick)="setSelectMode()"
    tooltipPosition="bottom"
    icon="ph ph-selection"
    severity="secondary"
  ></p-button>
  <p-button
    [pTooltip]="selExactTooltip()"
    [ariaLabel]="selExactTooltip()"
    [outlined]="!isSelectExactMode()"
    (onClick)="setSelectExactMode()"
    tooltipPosition="bottom"
    icon="ph ph-selection-slash"
    severity="secondary"
  ></p-button>
  <p-button
    [pTooltip]="eraserTooltip()"
    [ariaLabel]="eraserTooltip()"
    [outlined]="!isEraseMode()"
    (onClick)="setEraseMode()"
    tooltipPosition="bottom"
    icon="ph ph-eraser"
    severity="secondary"
  ></p-button>
  <p-button
    [pTooltip]="textTooltip()"
    [ariaLabel]="textTooltip()"
    [outlined]="!isPlaceTextMode()"
    (onClick)="setPlaceTextMode()"
    tooltipPosition="bottom"
    icon="ph ph-text-t"
    severity="secondary"
  ></p-button>
</div>
