<div *transloco="let t">
  <p-tabs [value]="activeTab()" (valueChange)="onTabChange($event)">
    <p-tablist>
      <p-tab value="local">{{ t('openProjectDialog.localProjects') }}</p-tab>
      <p-tab value="server">{{ t('openProjectDialog.serverProjects') }}</p-tab>
      <p-tab value="file">{{ t('openProjectDialog.fromFile') }}</p-tab>
    </p-tablist>
    <p-tabpanels>
      <!-- Local Projects -->
      <p-tabpanel value="local">
        <app-project-list
          [items]="localItems()"
          [loading]="loadingLocal()"
          [page]="localPage()"
          [totalItems]="localTotal()"
          (open)="openLocalProject($event)"
          (delete)="deleteLocalConfirmed($event)"
          (pageChange)="localPage.set($event)"
          (searchChange)="onLocalSearch($event)"
        />
      </p-tabpanel>

      <!-- Server Projects -->
      <p-tabpanel value="server">
        @if (!userService.user()) {
          <div class="flex flex-col items-center gap-3 py-12 text-surface-500">
            <i class="ph ph-warning-circle text-3xl"></i>
            <p class="text-center">{{ t('openProjectDialog.notLoggedIn') }}</p>
          </div>
        } @else {
          <app-project-list
            [items]="serverItems()"
            [loading]="loadingServer()"
            [page]="serverPage()"
            [totalItems]="serverTotal()"
            (open)="openServerProject($event)"
            (delete)="deleteServerConfirmed($event)"
            (pageChange)="onServerPageChange($event)"
            (searchChange)="onServerSearch($event)"
          />
        }
      </p-tabpanel>

      <!-- From File -->
      <p-tabpanel value="file">
        <div class="flex flex-col items-center gap-4 py-8">
          <p class="text-center text-surface-600 dark:text-surface-400">
            {{ t('openProjectDialog.uploadPrompt') }}
          </p>
          <p-fileupload
            mode="basic"
            accept="application/json"
            [fileLimit]="1"
            [customUpload]="true"
            [chooseLabel]="t('openProjectDialog.chooseFile')"
            chooseIcon="ph ph-cloud-arrow-up"
            (onSelect)="onFileSelect($event)"
          />
          @if (importError()) {
            <div
              class="flex items-center gap-2 rounded-lg bg-red-50 px-4 py-2 text-sm text-red-500 dark:bg-red-950/30"
            >
              <i class="ph ph-warning text-lg"></i>
              <span>{{ importError() }}</span>
            </div>
          }
        </div>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>
